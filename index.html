    <!-- ═══ STRUCTURED DATA — Site Web & Moteur de recherche ════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sendora",
      "url": "https://sendoraapp.com",
      "description": "Transport collaboratif de colis entre particuliers en France",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://sendoraapp.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══ STRUCTURED DATA — FAQ ════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Comment fonctionne Sendora ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sendora fonctionne en 3 étapes : publiez votre annonce colis en 2 minutes, choisissez un transporteur particulier vérifié qui fait déjà votre trajet, puis confirmez la livraison pour libérer le paiement. Simple, rapide et sécurisé."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte l'envoi d'un colis avec Sendora ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sendora est gratuit à l'inscription et sans abonnement. Le prix de chaque livraison est proposé par les transporteurs et peut être jusqu'à 60 % moins cher qu'un transporteur classique. Vous choisissez l'offre qui vous convient."
          }
        },
        {
          "@type": "Question",
          "name": "Comment Sendora garantit-il la sécurité des paiements ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sendora utilise le système d'escrow (séquestre) de Stripe. Votre paiement est bloqué de façon sécurisée jusqu'à la confirmation de réception de votre colis. Le transporteur ne reçoit ses fonds qu'après validation de la livraison."
          }
        },
        {
          "@type": "Question",
          "name": "Les transporteurs sont-ils vérifiés ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, tous les transporteurs passent par un processus de vérification d'identité complet (KYC) via Didit, partenaire agréé eIDAS. Vous savez toujours à qui vous confiez votre colis."
          }
        },
        {
          "@type": "Question",
          "name": "Sendora est-il disponible sur iPhone et Android ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Sendora est disponible gratuitement sur l'App Store (iOS) et sur Google Play (Android). L'application est actuellement en bêta ouverte."
          }
        },
        {
          "@type": "Question",
          "name": "Comment gagner de l'argent avec Sendora en tant que transporteur ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Si vous effectuez régulièrement des trajets en voiture, vous pouvez proposer de transporter des colis sur votre route. Vous définissez vos disponibilités, acceptez uniquement les missions qui vous conviennent, et recevez votre paiement directement via Stripe Connect sous 2 à 7 jours ouvrés."
          }
        }
      ]
    }
    </script>

    <!-- ═══ STRUCTURED DATA — Service ════════════════════════════════════ -->

      "areaServed": {
        "@type": "Country",
        "name": "France"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",

            "@type": "Offer",

              "@type": "Service",

            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Transport de colis",
              "description": "Transportez des colis sur votre trajet habituel et générez des revenus complémentaires"

          }
        ]

    }
